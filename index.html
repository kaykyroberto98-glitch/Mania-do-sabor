<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mania do Sabor</title>
<style>
body { font-family: Arial; padding:20px; background:#fff5f0; }
h1 { color:#c0392b; }
button { padding:10px; margin:5px; border:none; background:#c0392b; color:white; border-radius:8px; }
input, select, textarea { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; }
</style>
</head>

<body>

<h1>🍕 Mania do Sabor</h1>

<div class="card">
<h3>Pizzas</h3>
<button onclick="add('Calabresa',35)">Calabresa - R$35</button>
<button onclick="add('Frango com Catupiry',40)">Frango - R$40</button>
<button onclick="add('Portuguesa',42)">Portuguesa - R$42</button>
<button onclick="add('Mussarela',35)">Mussarela - R$35</button>
</div>

<div class="card">
<h3>Bebidas</h3>
<button onclick="add('Coca-Cola 2L',15)">Coca 2L - R$15</button>
</div>

<div class="card">
<h3>Pedido</h3>
<textarea id="pedido" rows="6"></textarea>
<p><b>Subtotal:</b> R$ <span id="subtotal">0</span></p>
<p><b>Entrega:</b> <input id="entrega" placeholder="Ex: 10"></p>
<p><b>Total:</b> R$ <span id="total">0</span></p>
</div>

<div class="card">
<h3>Dados</h3>
<input id="nome" placeholder="Seu nome">
<input id="telefone" placeholder="Telefone">
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<textarea id="obs" placeholder="Observações"></textarea>

<select id="pagamento">
<option>Dinheiro</option>
<option>Pix</option>
<option>Cartão</option>
</select>

<input id="troco" placeholder="Troco para (se dinheiro)">
</div>

<button onclick="enviar()">📲 Enviar Pedido</button>

<script>
let pedido = [];
let subtotal = 0;

function add(nome, preco){
  pedido.push(nome + " - R$" + preco);
  subtotal += preco;
  atualizar();
}

function atualizar(){
  document.getElementById('pedido').value = pedido.join("\\n");
  document.getElementById('subtotal').innerText = subtotal;
  calcularTotal();
}

function calcularTotal(){
  let entrega = Number(document.getElementById('entrega').value) || 0;
  document.getElementById('total').innerText = subtotal + entrega;
}

document.getElementById('entrega').addEventListener('input', calcularTotal);

function enviar(){
  let nome = document.getElementById('nome').value;
  let tel = document.getElementById('telefone').value;
  let rua = document.getElementById('rua').value;
  let numero = document.getElementById('numero').value;
  let bairro = document.getElementById('bairro').value;
  let pagamento = document.getElementById('pagamento').value;
  let troco = document.getElementById('troco').value;
  let obs = document.getElementById('obs').value;
  let entrega = Number(document.getElementById('entrega').value) || 0;
  let total = subtotal + entrega;

  let texto = `🍕 *Mania do Sabor* 🍕

*Cliente:* ${nome}
*Contato:* ${tel}

------------------------

${pedido.join("\\n")}

------------------------
*Subtotal:* R$ ${subtotal}
*Entrega:* R$ ${entrega}
*Total:* R$ ${total}

------------------------
*Endereço:*
Rua: ${rua}
Número: ${numero}
Bairro: ${bairro}

------------------------
*Pagamento:* ${pagamento}
${pagamento === "Dinheiro" ? "*Troco para:* R$ " + troco : ""}

*Observações:* ${obs}

⏱ Tempo: 45 minutos`;

  let link = "https://wa.me/5581992563138?text=" + encodeURIComponent(texto);
  window.open(link);
}
</script>

</body>
</html>
