<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mania do Sabor</title>
</head>

<body style="font-family: Arial; padding:20px">

<h1>🍕 Mania do Sabor</h1>

<h3>Pizzas:</h3>
<button onclick="add('Pizza Calabresa 35')">Calabresa - R$35</button><br><br>
<button onclick="add('Pizza Frango 40')">Frango - R$40</button><br><br>

<h3>Bebidas:</h3>
<button onclick="add('Coca 2L 15')">Coca 2L - R$15</button><br><br>

<h3>Pedido:</h3>
<textarea id="pedido" style="width:100%;height:120px"></textarea><br><br>

Nome:<br>
<input id="nome"><br><br>

Endereço:<br>
<input id="endereco"><br><br>

Pagamento:<br>
<select id="pagamento">
<option>Dinheiro</option>
<option>Pix</option>
<option>Cartão</option>
</select><br><br>

<button onclick="enviar()">Enviar Pedido</button>

<script>
let lista = [];

function add(item){
  lista.push(item);
  document.getElementById('pedido').value = lista.join("\\n");
}

function enviar(){
  let nome = document.getElementById('nome').value;
  let endereco = document.getElementById('endereco').value;
  let pagamento = document.getElementById('pagamento').value;

  let texto = "🍕 Mania do Sabor 🍕\\n\\n";
  texto += "Cliente: " + nome + "\\n";
  texto += "Endereço: " + endereco + "\\n\\n";
  texto += "Pedido:\\n" + lista.join("\\n") + "\\n\\n";
  texto += "Pagamento: " + pagamento + "\\n";
  texto += "Tempo: 45 minutos";

  let link = "https://wa.me/5581992563138?text=" + encodeURIComponent(texto);

  window.open(link);
}
</script>

</body>
</html>
